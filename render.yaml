services:
  - type: web
    name: breathe-esg
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt &&
      cd ../frontend &&
      npm install &&
      npm run build &&
      mkdir -p ../backend/staticfiles/frontend &&
      cp -r dist/* ../backend/staticfiles/frontend/ &&
      cd ../backend &&
      python manage.py collectstatic --no-input &&
      python manage.py migrate &&
      python manage.py create_demo_data
    startCommand: gunicorn breathe_esg.wsgi:application --workers 2 --timeout 120
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DEMO_ANALYST_PASSWORD
        value: analyst123
      - key: DEMO_ADMIN_PASSWORD
        value: admin123
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: breathe-esg-db
    plan: free
    databaseName: breathe_esg
    user: breathe_esg_user
